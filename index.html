<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>KawanBaca – Dashboard Bacaan</title>
  <meta name="description" content="Dashboard interaktif untuk memantau tren bacaan dan skor empati komunitas KawanBaca." />

  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />

  <!-- Chart.js -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.7/dist/chart.umd.min.js"></script>

  <link rel="stylesheet" href="/style.css" />
</head>
<body>
  <!-- ─── Animated Background Blobs ─────────────────────────────────── -->
  <div class="bg-blob blob-1" aria-hidden="true"></div>
  <div class="bg-blob blob-2" aria-hidden="true"></div>
  <div class="bg-blob blob-3" aria-hidden="true"></div>

  <!-- ─── Header ────────────────────────────────────────────────────── -->
  <header class="header">
    <div class="header__inner">
      <div class="header__brand">
        <span class="header__icon">📖</span>
        <div>
          <h1 class="header__title">KawanBaca</h1>
          <p class="header__subtitle">Dashboard Trend Bacaan</p>
        </div>
      </div>
      <div class="header__actions">
        <button id="btn-refresh" class="btn btn--ghost" title="Refresh data">
          <svg class="btn__icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 4v6h6"/><path d="M23 20v-6h-6"/><path d="M20.49 9A9 9 0 0 0 5.64 5.64L1 10m22 4l-4.64 4.36A9 9 0 0 1 3.51 15"/></svg>
          <span>Refresh</span>
        </button>
        <span id="last-updated" class="header__timestamp">–</span>
      </div>
    </div>
  </header>

  <!-- ─── Main Content ──────────────────────────────────────────────── -->
  <main class="main">

    <!-- Metric Cards -->
    <section class="metrics" id="metrics-grid">
      <div class="card card--metric card--blue" id="card-laporan">
        <div class="card__icon-wrap card__icon-wrap--blue">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/><polyline points="10 9 9 9 8 9"/></svg>
        </div>
        <p class="card__label">Total Laporan</p>
        <p class="card__value" id="val-laporan">–</p>
      </div>

      <div class="card card--metric card--orange" id="card-halaman">
        <div class="card__icon-wrap card__icon-wrap--orange">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"/><path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"/></svg>
        </div>
        <p class="card__label">Total Halaman</p>
        <p class="card__value" id="val-halaman">–</p>
      </div>

      <div class="card card--metric card--green" id="card-anggota">
        <div class="card__icon-wrap card__icon-wrap--green">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>
        </div>
        <p class="card__label">Anggota Berpartisipasi</p>
        <p class="card__value" id="val-anggota">–</p>
      </div>

      <div class="card card--metric card--purple" id="card-skor">
        <div class="card__icon-wrap card__icon-wrap--purple">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg>
        </div>
        <p class="card__label">Rata-rata Skor Empati</p>
        <p class="card__value" id="val-skor">–</p>
      </div>
    </section>

    <!-- Charts -->
    <section class="charts">
      <div class="card card--chart" id="chart-card-skor">
        <h2 class="card__chart-title">📈 Tren Skor Empati Mingguan</h2>
        <div class="card__chart-wrap">
          <canvas id="chart-skor"></canvas>
        </div>
      </div>

      <div class="card card--chart" id="chart-card-laporan">
        <h2 class="card__chart-title">📊 Jumlah Laporan per Minggu</h2>
        <div class="card__chart-wrap">
          <canvas id="chart-laporan"></canvas>
        </div>
      </div>
    </section>

  </main>

  <!-- ─── Footer ────────────────────────────────────────────────────── -->
  <footer class="footer">
    <p>© 2026 KawanBaca · Data driven by Google Sheets</p>
  </footer>

  <!-- ─── Loading Overlay ───────────────────────────────────────────── -->
  <div class="loading-overlay" id="loading-overlay">
    <div class="spinner"></div>
    <p class="loading-text">Memuat data…</p>
  </div>

  <script src="/app.js"></script>
</body>
</html>
